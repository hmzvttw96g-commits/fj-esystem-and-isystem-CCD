# 福建省本科高校参照名单（E端完备性检查 + 抽取归一化共用输入）
# 状态：v1.0 草案，基于教育部《全国普通高等学校名单》域内知识整理
# ⚠ 冻结前必须人工对照教育部最新名单逐校复核（confidence 字段标注当前把握）
# 用途：
#   1. 完备性闸门：每个城市-年份，本表 expect_B_majors=yes 的学校（**不分办学性质**，
#      2026-06-12 总体规则裁定后民办/独立学院同等纳入闸门分母）零命中时自动生成核查任务，
#      人工确认"真零"前禁止入面板
#   2. 抽取归一化：school_name_history 提供曾用名匹配（WP0.5 已证实福建工程学院因更名漏抽4年）
#   3. ownership 字段用于"民办份额×口径"梯度表与描述统计，不作筛选条件
# 新型大学说明：福耀科技大学 2024 年设立、2025 年首招，超出 2015—2024 窗口，暂不列入

meta:
  version: "1.0-draft"
  frozen: false
  level_scope: 本科（含职业本科）；专科院校不在本表
  verify_against: "教育部《全国普通高等学校名单》最新版 + 各校当年招生章程"

schools:
  # ---------- 福州 ----------
  - {name: 福州大学, city: 福州, ownership: public, expect_B_majors: yes, confidence: high}
  - {name: 福建师范大学, city: 福州, ownership: public, expect_B_majors: yes, confidence: high}
  - {name: 福建农林大学, city: 福州, ownership: public, expect_B_majors: yes, confidence: high}
  - {name: 福建医科大学, city: 福州, ownership: public, expect_B_majors: no, confidence: high,
     note: 医学信息工程是否入X待裁定（pending_ruling）}
  - {name: 福建中医药大学, city: 福州, ownership: public, expect_B_majors: yes, confidence: high}
  - {name: 福建理工大学, city: 福州, ownership: public, expect_B_majors: yes, confidence: high,
     school_name_history: [{former: 福建工程学院, until: 2023-05}],
     note: WP0.5证实2019—2022疑因旧校名漏抽}
  - {name: 闽江学院, city: 福州, ownership: public, expect_B_majors: yes, confidence: high}
  - {name: 福建江夏学院, city: 福州, ownership: public, expect_B_majors: yes, confidence: high}
  - {name: 福建技术师范学院, city: 福州, ownership: public, expect_B_majors: yes, confidence: medium,
     school_name_history: [{former: 福建师范大学福清分校, until: 2019}], note: 校址福清（福州代管）}
  - {name: 福建警察学院, city: 福州, ownership: public, expect_B_majors: tbd, confidence: low,
     note: 网络安全与执法属公安技术类，入径待裁定}
  - {name: 福建商学院, city: 福州, ownership: public, expect_B_majors: tbd, confidence: low}
  - {name: 阳光学院, city: 福州, ownership: private, expect_B_majors: yes, confidence: medium,
     school_name_history: [{former: 福州大学阳光学院, until: 2015}]}
  - {name: 福州外语外贸学院, city: 福州, ownership: private, expect_B_majors: yes, confidence: medium, note: 校址长乐}
  - {name: 福州理工学院, city: 福州, ownership: private, expect_B_majors: yes, confidence: medium}
  - {name: 福州工商学院, city: 福州, ownership: private, expect_B_majors: tbd, confidence: low,
     school_name_history: [{former: 福建农林大学东方学院, until: 2020}], note: 校址永泰}
  - {name: 福州大学至诚学院, city: 福州, ownership: independent_college, expect_B_majors: yes, confidence: medium}
  - {name: 福建师范大学协和学院, city: 福州, ownership: independent_college, expect_B_majors: yes, confidence: medium}
  - {name: 福建农林大学金山学院, city: 福州, ownership: independent_college, expect_B_majors: tbd, confidence: low}

  # ---------- 厦门 ----------
