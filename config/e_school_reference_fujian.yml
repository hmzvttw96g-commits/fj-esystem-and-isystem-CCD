  - {name: 厦门工学院, city: 厦门, ownership: private, expect_B_majors: yes, confidence: medium}
  - {name: 集美大学诚毅学院, city: 厦门, ownership: independent_college, expect_B_majors: yes, confidence: medium}
  - {name: 厦门大学嘉庚学院, city: 漳州, ownership: independent_college, expect_B_majors: yes, confidence: high,
