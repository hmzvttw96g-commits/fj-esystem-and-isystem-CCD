  - {name: 闽南理工学院, city: 泉州, ownership: private, expect_B_majors: yes, confidence: medium, note: 校址石狮}
  - {name: 泉州信息工程学院, city: 泉州, ownership: private, expect_B_majors: yes, confidence: medium}
